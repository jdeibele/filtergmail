<!-- verify.html — email confirmation landing | v0.1.0 | 2026-06-25 -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% if ok %}Email confirmed{% else %}Link not found{% endif %} — {{ brand }}</title>
<style>
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
       font:16px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
       color:#202124;background:#fbfbfa}
  .card{max-width:440px;margin:24px;padding:32px 28px;background:#fff;border:1px solid #e5e7eb;
        border-radius:14px;text-align:center}
  .mark{font-size:40px;line-height:1}
  h1{font-size:20px;margin:14px 0 6px}
  p{color:#5f6368;margin:6px 0}
  a{display:inline-block;margin-top:18px;color:#1a73e8;text-decoration:none;font-weight:600}
</style>
</head>
<body>
  <div class="card">
    {% if ok %}
      <div class="mark">✅</div>
      <h1>You're confirmed</h1>
      <p>{{ email }} is on the list. We'll email you the moment the advanced version is ready —
         nothing else.</p>
    {% else %}
      <div class="mark">🔗</div>
      <h1>That link didn't work</h1>
      <p>It may have already been used or expired. You can sign up again from the home page.</p>
    {% endif %}
    <a href="/">← Back to {{ brand }}</a>
  </div>
</body>
</html>
